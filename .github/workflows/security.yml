name: Security audit

on:
  schedule:
    - cron: "0 6 * * 1"  
  workflow_dispatch:

jobs:
  cargo-audit:
    name: cargo-audit (Rust deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --locked cargo-audit   
      - run: cargo audit                          

